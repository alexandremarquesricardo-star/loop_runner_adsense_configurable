name = "playloop-og-card"
main = "src/index.mjs"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# WASM + font binaries are imported directly from src/. Wrangler bundles them at build time.
rules = [
  { type = "Data",          globs = ["**/*.ttf", "**/*.otf"], fallthrough = true },
  { type = "CompiledWasm",  globs = ["**/*.wasm"],            fallthrough = true },
]

# Bind the worker to og.playloop.run. The CNAME og → playloop-og-card.<account>.workers.dev
# in Cloudflare DNS (orange-cloud / proxied) is what makes this route resolve.
route = { pattern = "og.playloop.run/*", zone_name = "playloop.run" }

[observability]
enabled = true
