<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loop Runner — Free Browser Action Game | Playloop.run</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#0b0b10; --fg:#eaecef; --accent:#0ff; --adCap:90px; --navH:44px; }
    html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:14px/1.35 system-ui;overflow:hidden}
    #site-nav{position:fixed;top:var(--adH,var(--adCap));left:0;right:0;z-index:29;display:flex;gap:14px;align-items:center;justify-content:center;height:var(--navH);background:rgba(0,0,0,.35);backdrop-filter:blur(6px);border-bottom:1px dashed #2a2f3a;padding:0 12px}
    #site-nav a,#site-nav .brand{color:#eaecef;text-decoration:none;font-weight:600;letter-spacing:.2px}
    #site-nav .brand{margin-right:8px}
    #nav-scoreboard{position:absolute;right:12px;top:50%;transform:translateY(-50%);font:700 26px/1 'Orbitron',system-ui,sans-serif;color:var(--accent);letter-spacing:1.2px;pointer-events:none;text-shadow:0 0 4px var(--accent),0 0 8px var(--accent),0 0 16px var(--accent),0 0 32px rgba(0,255,255,.55)}
    @keyframes neonPulse{0%{text-shadow:0 0 6px #0ff,0 0 12px #0ff,0 0 24px #0ff}50%{text-shadow:0 0 10px #0ff,0 0 20px #0ff,0 0 30px #0ff}100%{text-shadow:0 0 6px #0ff,0 0 12px #0ff,0 0 24px #0ff}}
    .pulse{animation:neonPulse .35s ease-out}
    @keyframes scoreFlash{0%,100%{opacity:1}25%{opacity:.6}50%{opacity:1}75%{opacity:.7}}
    .flash{animation:scoreFlash .6s ease-out}
    @keyframes scoreFlicker{0%,18%,22%,25%,53%,57%,100%{opacity:1}20%,55%{opacity:.2}24%{opacity:.5}}
    .flicker{animation:scoreFlicker 1.4s ease-in-out}
  </style>
</head>
<body>
  <nav id="site-nav">
    <span class="brand">Playloop</span> · <a href="/">Home</a> · <a href="how-to-play.html">How to Play</a> · <a href="updates.html">Updates</a> · <a href="about.html">About</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>
    <span id="nav-scoreboard" aria-live="polite" role="status">0</span>
  </nav>
  <canvas id="game"></canvas>
  <div id="ui">
    <div class="hud">
      <div id="combo" class="pill">Combo: 0</div>
      <div id="best" class="pill">Best: 0</div>
      <div id="daily" class="pill">Daily: 0</div>
      <button id="lbBtn" class="cta cta--secondary">Leaderboard</button>
    </div>
  </div>
  <script>
    (function(){
      const sb=document.getElementById('nav-scoreboard');
      const comboPill=document.getElementById('combo');
      const bestPill=document.getElementById('best');
      let lastScore=-1,lastComboMilestone=0;
      function renderScore(n){
        const v=Number(n||0);
        if(v===lastScore)return;lastScore=v;
        sb.textContent=v.toLocaleString();
        sb.classList.remove('pulse');void sb.offsetWidth;sb.classList.add('pulse');
        const m=bestPill&&bestPill.textContent.match(/(\d[\d,]*)/);
        const best=m?parseInt(m[1].replace(/,/g,''),10):0;
        if(v>best){sb.classList.remove('flicker');void sb.offsetWidth;sb.classList.add('flicker');}
      }
      window.setScoreboard=renderScore;window.updateScoreboard=renderScore;
      if(comboPill){
        const milestones=[10,25,50,100,200,400,800];
        const onComboChange=()=>{
          const m=comboPill.textContent.match(/(\d[\d,]*)/);
          const combo=m?parseInt(m[1].replace(/,/g,''),10):0;
          const next=milestones.find(x=>x>lastComboMilestone);
          if(next&&combo>=next){lastComboMilestone=next;sb.classList.remove('flash');void sb.offsetWidth;sb.classList.add('flash');}
        };
        new MutationObserver(onComboChange).observe(comboPill,{characterData:true,subtree:true,childList:true});
      }
    })();
  </script>
</body>
</html>
